<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grilla de GIFs</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="page">
  <main class="main">

    <audio id="musica-fondo" loop preload="auto">
      <source src="audio.mp3" type="audio/mpeg" />
      Tu navegador no soporta el elemento de audio.
    </audio>

  </main>
</div>

<script>
  // Usamos 'pointerdown' o 'click' para asegurar la interacción del usuario
  window.addEventListener('click', () => {
    const reproductor = document.getElementById('musica-fondo');
    
    if (reproductor && reproductor.paused) {
      reproductor.play()
        .then(() => {
          console.log("Reproducción iniciada correctamente.");
        })
        .catch(error => {
          console.error("Error al intentar reproducir:", error);
        });
    }
  }, { once: true }); // '{ once: true }' hace que el evento se ejecute solo la primera vez que haces clic
</script>
